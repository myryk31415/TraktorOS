name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 34.210.69.60
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/TraktorOS || git clone https://github.com/${{ github.repository }}.git ~/TraktorOS
            cd ~/TraktorOS
            git pull origin main
            pip3 install -r requirements.txt --quiet
            pkill -f local_server.py || true
            nohup python3 local_server.py > server.log 2>&1 &
